name: CI/CD Pipeline

on:
  push:
    branches: [ copy ]
  pull_request:
    branches: [ copy ]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache npm modules for frontend
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-frontend-

      - name: Install dependencies
        run: npm ci

      # - name: Run lint
      #   run: npm run lint
      #   working-directory: ./frontend

      # - name: Prettier check
      #   run: npm run format:check
      #   working-directory: ./frontend

      - name: Type check + build
        run: npm run build
      
      - name: Build Docker image
        run: docker build -t nayanmoni458/stoneinscription:frontend-latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push nayanmoni458/stoneinscription:frontend-latest

